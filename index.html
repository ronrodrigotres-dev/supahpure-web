<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supahpure Studios | Animación Digital</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Gochi+Hand&display=swap" rel="stylesheet">

<style>
:root{
  --white:#ffffff;
  --black:#0a0a0a;
  --purple-brand:#6104ff;
  --purple-bg:#3b0764;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--black);
  color:var(--white);
  overflow-x:hidden;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:1.2rem 5vw;
  display:flex;
  align-items:center;
  z-index:1000;
  background:linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
}

.logo-container{
  display:flex;
  align-items:center;
  gap:1rem;
  text-decoration:none;
  color:white;
}

.raton-img{
  width:70px;
}

.texto-logo{
  font-family:'Gochi Hand',cursive;
  font-size:2rem;
  line-height:0.8;
}

/* HERO */
.hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero-video{
  position:absolute;
  top:50%;
  left:50%;
  min-width:100%;
  min-height:100%;
  transform:translate(-50%,-50%);
  object-fit:cover;
}

.hero-overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.25);
}

/* PROJECTS */
.project-row{
  display:flex;
  min-height:100vh;
  align-items:center;
  flex-wrap:wrap;
}

.project-row.reverse{
  flex-direction:row-reverse;
}

.project-image,
.project-info{
  flex:1;
  min-width:50%;
  padding:5% 8%;
}

.project-image img{
  width:100%;
  border-radius:8px;
  box-shadow:20px 20px 0 rgba(0,0,0,0.2);
}

.project-info h2{
  font-weight:800;
  font-size:3rem;
  margin-bottom:1rem;
}

.project-info p{
  margin-bottom:1rem;
}

.btn-project{
  display:inline-block;
  padding:15px 35px;
  border-radius:50px;
  font-weight:800;
  text-decoration:none;
  border:2px solid white;
  margin-top:20px;
  transition:0.3s ease;
  color:white;
}

.btn-project:hover{
  background:white;
  color:black;
  transform:scale(1.05);
}

/* TEAM */
.team-section{
  background:#111;
  padding:100px 8%;
  text-align:center;
}

.team-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:40px;
  margin-top:60px;
}

.team-member img{
  width:100%;
  border-radius:12px;
  border:4px solid var(--purple-brand);
  margin-bottom:20px;
}

/* CONTACT */
.contact-section{
  background:var(--purple-bg);
  padding:100px 5%;
  text-align:center;
}

.contact-title{
  font-size:3rem;
  margin-bottom:20px;
}

.email-link{
  color:white;
  text-decoration:none;
  font-size:1.3rem;
  display:block;
  margin-bottom:40px;
}

.social-icons{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.social-icons img{
  width:65px;
  transition:0.3s ease;
}

.social-icons img:hover{
  transform:scale(1.2) rotate(-5deg);
}

/* RESPONSIVE */
@media(max-width:900px){
  .project-image,
  .project-info{
    min-width:100%;
    text-align:center;
  }

  .project-info h2{
    font-size:2rem;
  }
}
</style>
</head>

<body>

<header>
<a href="#home" class="logo-container">
<img src="imagenes/logo.png" class="raton-img" alt="Supahpure Logo">
<div class="texto-logo">Supahpure<br>Studios</div>
</a>
</header>

<section class="hero" id="home">
<video class="hero-video" autoplay muted loop playsinline>
<source src="marta-720.mp4" type="video/mp4">
</video>
<div class="hero-overlay"></div>
</section>

</body>
</html>
